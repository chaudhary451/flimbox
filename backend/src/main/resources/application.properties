# ─── Server ───────────────────────────────────────────────────────────────────
server.port=8080
server.compression.enabled=true
server.compression.mime-types=application/json,application/xml,text/html,text/plain

# ─── Database (PostgreSQL) ────────────────────────────────────────────────────
spring.datasource.url=jdbc:postgresql://localhost:5432/flimbox
spring.datasource.username=flimbox_user
spring.datasource.password=flimbox_pass
spring.datasource.hikari.maximum-pool-size=20
spring.datasource.hikari.minimum-idle=5
spring.datasource.hikari.connection-timeout=30000
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.properties.hibernate.jdbc.batch_size=25
spring.jpa.properties.hibernate.order_inserts=true

# ─── Flyway Migrations ────────────────────────────────────────────────────────
spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration

# ─── Redis Cache ──────────────────────────────────────────────────────────────
spring.data.redis.host=localhost
spring.data.redis.port=6379
spring.data.redis.timeout=2000ms
spring.cache.type=redis
spring.cache.redis.time-to-live=600000

# ─── JWT ──────────────────────────────────────────────────────────────────────
flimbox.jwt.secret=CHANGE_THIS_TO_A_256BIT_SECRET_KEY_IN_PRODUCTION
flimbox.jwt.expiration-ms=86400000
flimbox.jwt.refresh-expiration-ms=604800000

# ─── Download Token ───────────────────────────────────────────────────────────
flimbox.download.token-expiry-minutes=15
flimbox.download.base-url=https://cdn.flimbox.example.com

# ─── CORS ─────────────────────────────────────────────────────────────────────
flimbox.cors.allowed-origins=http://localhost:3000,http://localhost:5500,file://

# ─── Rate Limiting ────────────────────────────────────────────────────────────
flimbox.rate-limit.requests-per-minute=60
flimbox.rate-limit.download-per-hour=20

# ─── Actuator ─────────────────────────────────────────────────────────────────
management.endpoints.web.exposure.include=health,info,metrics
management.endpoint.health.show-details=when-authorized

# ─── Logging ──────────────────────────────────────────────────────────────────
logging.level.com.flimbox=INFO
logging.level.org.springframework.security=WARN
